appId: com.ghostreader.app
productName: Ghost Reader
copyright: Copyright © 2026 Ghost Reader

directories:
  buildResources: resources
  output: dist

files:
  - out/**/*

mac:
  category: public.app-category.books
  target:
    - dmg
    - zip
  artifactName: ${productName}-${version}-${arch}.${ext}

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
