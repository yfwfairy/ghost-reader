name: CI

on:
  push:
    branches: [feat/ghost-reader-v1, main]
  pull_request:
    branches: [feat/ghost-reader-v1, main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bunx tsc -b --noEmit

      - name: Test
        run: bun run test
